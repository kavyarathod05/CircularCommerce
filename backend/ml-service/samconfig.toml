# SAM CLI deploy configuration for SecondLife ML + Telemetry stack
# Usage: sam deploy (uses these defaults automatically)

version = 0.1

[default.deploy.parameters]
stack_name = "secondlife-ml-telemetry"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = false
resolve_s3 = true
image_repositories = []
